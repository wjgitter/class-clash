  <title>Class Clash Arena</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;family=Orbitron:wght@400;700;900&amp;display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Orbitron', sans-serif; margin: 0; overflow: hidden; }
    .pixel-font { font-family: 'Press Start 2P', cursive; }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    @keyframes pulse-glow {
      0%, 100% { filter: drop-shadow(0 0 5px currentColor); }
      50% { filter: drop-shadow(0 0 15px currentColor); }
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    
    .character-select:hover {
      animation: float 0.5s ease-in-out infinite;
    }
    
    .selected-character {
      animation: pulse-glow 1s ease-in-out infinite;
    }
    
    .damage-flash {
      animation: shake 0.1s ease-in-out;
    }
    
    .platform {
      transition: transform 0.1s ease-out;
    }
    
    .bouncy-platform {
      background: linear-gradient(180deg, #ff6b6b 0%, #c92a2a 100%);
    }
    
    .moving-platform {
      background: linear-gradient(180deg, #4ecdc4 0%, #087f5b 100%);
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>

        this.knockbackResist = false;
      }

      update(otherPlayer) {
        if (this.stunned) {
          this.stunTimer--;
          if (this.stunTimer <= 0) this.stunned = false;
          this.applyPhysics();
          return;
        }

        // Controls
        const controls = this.playerNum === 0 
          ? { left: 'KeyA', right: 'KeyD', up: 'KeyW', down: 'KeyS', attack: 'KeyF', special: 'KeyG' }
          : { left: 'ArrowLeft', right: 'ArrowRight', up: 'ArrowUp', down: 'ArrowDown', attack: 'Numpad0', special: 'NumpadDecimal' };

        // Alternative controls for P2
        const altControls = this.playerNum === 1 
          ? { attack: 'Comma', special: 'Period' }
          : {};

        // Movement
        if (keys[controls.left]) {
          this.vx = -this.character.speed * 1.3;
          this.facing = -1;
        } else if (keys[controls.right]) {
          this.vx = this.character.speed * 1.3;
          this.facing = 1;
        } else {
          this.vx *= 0.8;
        }

        // Jump
        if ((keys[controls.up]) && this.grounded) {
          this.vy = -this.character.jumpPower;
          this.grounded = false;
        }

        // Fast fall
        if (keys[controls.down] && !this.grounded) {
          this.vy += 0.5;
        }

        // Attack
        if ((keys[controls.attack] || keys[altControls.attack]) && !this.attacking && this.attackTimer <= 0) {
          this.attack(otherPlayer);
        }

        // Special
        if ((keys[controls.special] || keys[altControls.special]) && this.specialCooldown <= 0 && !this.specialActive) {
          this.useSpecial(otherPlayer);
        }

        // Timers
        if (this.attackTimer > 0) this.attackTimer--;
        if (this.specialCooldown > 0) this.specialCooldown--;
        if (this.specialTimer > 0) {
          this.specialTimer--;
          if (this.specialTimer <= 0) {
            this.specialActive = false;
            this.knockbackResist = false;
          }
        }
        if (this.invincibleTimer > 0) {
          this.invincibleTimer--;
          if (this.invincibleTimer <= 0) this.invincible = false;
        }

        // Berserker passive
        if (this.character.id === 'berserker' && this.damage > 100) {
          this.character.attackPower = 7 * (1 + this.damage / 200);
        }

        this.applyPhysics();
      }

              this.x < platX + plat.width &&
              this.y + this.height >= platY &&

              createParticles(this.x + this.width/2, this.y + this.height, '#ff6b6b', 5);
            } else if (plat.type === 'sticky') {
              // Sticky platform - reduce movement speed
              this.vx *= 0.5;
              this.vy = 0;
            } else {
              this.vy = 0;
              // Move with platform
              if (plat.type === 'moving' && plat.axis === 'x') {
                this.x += plat.moveDir * plat.moveSpeed;
              }
            }
          }
        });

        // Screen bounds (no death above screen)
        if (this.x < -50 || this.x > 850 || this.y > 600) {
          this.die();
        }
        

        if (this.y < -100) {
          this.vy = Math.abs(this.vy) * 0.5;
        }

      darkenColor(hex, percent) {
        const num = parseInt(hex.replace("#", ""), 16);
        const amt = Math.round(2.55 * percent);
        const R = Math.max(0, (num >> 16) - amt);
        const G = Math.max(0, (num >> 8 & 0x00FF) - amt);
        const B = Math.max(0, (num & 0x0000FF) - amt);
        return "#" + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
      }

      drawStar(ctx, x, y, points, size) {
        const step = (Math.PI * 2) / points;
        ctx.beginPath();
        for (let i = 0; i < points * 2; i++) {
          const rad = step * i;
          const dist = i % 2 === 0 ? size : size / 2;
          const px = x + Math.cos(rad) * dist;
          const py = y + Math.sin(rad) * dist;
          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fill();
      }

    function pauseGame() {
      if (gameLoop) {
        cancelAnimationFrame(gameLoop);
        gameLoop = null;
        
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 48px Orbitron';
        ctx.textAlign = 'center';
        ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
        ctx.font = '20px Orbitron';
        ctx.fillText('Press any key to continue', canvas.width / 2, canvas.height / 2 + 40);
        
        const resumeHandler = () => {
          document.removeEventListener('keydown', resumeHandler);
          gameLoop = requestAnimationFrame(gameUpdate);
        };
        document.addEventListener('keydown', resumeHandler);
      }
    }

    function initGame() {
      const canvas = document.getElementById('gameCanvas');
      const container = document.getElementById('game-arena');
      canvas.width = 800;
      canvas.height = 500;
      
      // Initialize platforms with movement state
      platforms = selectedStage.platforms.map(p => ({
        ...p,
        currentX: p.x,
        currentY: p.y,
        moveDir: 1,
        startX: p.x,
        startY: p.y
      }));
      
      // Initialize players
      players = [
        new Player(0, selectedCharacters[0], 200, 300),
        new Player(1, selectedCharacters[1], 550, 300)
      ];
      
      projectiles = [];
      particles = [];
      gameTime = 99 * 60; // 99 seconds in frames
      
      gameLoop = requestAnimationFrame(gameUpdate);
    }

    function gameUpdate() {
      if (gameState !== 'battle') return;
      
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      
      // Clear
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Render detailed background
      if (selectedStage.renderBg) {
        selectedStage.renderBg(ctx, canvas.width, canvas.height);
      }
      
      // Update platforms
      platforms.forEach(plat => {
        if (plat.type === 'moving') {
          if (plat.axis === 'x') {
            plat.currentX += plat.moveDir * plat.moveSpeed;
            if (plat.currentX > plat.startX + plat.moveRange || plat.currentX < plat.startX - plat.moveRange) {
              plat.moveDir *= -1;
            }
          } else {
            plat.currentY += plat.moveDir * plat.moveSpeed;
            if (plat.currentY > plat.startY + plat.moveRange || plat.currentY < plat.startY - plat.moveRange) {
              plat.moveDir *= -1;
            }
          }
        }
      });
      
      // Draw platforms
      platforms.forEach(plat => {
        const x = plat.currentX || plat.x;
        const y = plat.currentY || plat.y;
        
        ctx.save();
        if (plat.type === 'bouncy') {
          const gradient = ctx.createLinearGradient(x, y, x, y + plat.height);
          gradient.addColorStop(0, '#ff6b6b');
          gradient.addColorStop(1, '#c92a2a');
          ctx.fillStyle = gradient;
        } else if (plat.type === 'sticky') {
          const gradient = ctx.createLinearGradient(x, y, x, y + plat.height);
          gradient.addColorStop(0, '#8b7355');
          gradient.addColorStop(1, '#5d4037');
          ctx.fillStyle = gradient;
        } else if (plat.type === 'moving') {
          const gradient = ctx.createLinearGradient(x, y, x, y + plat.height);
          gradient.addColorStop(0, '#4ecdc4');
          gradient.addColorStop(1, '#087f5b');
          ctx.fillStyle = gradient;
        } else {
          ctx.fillStyle = '#5c6370';
        }
        
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.shadowBlur = 5;
        ctx.shadowOffsetY = 3;
        
        ctx.beginPath();
        ctx.roundRect(x, y, plat.width, plat.height, 5);
        ctx.fill();
        
        // Sticky platform texture
        if (plat.type === 'sticky') {
          ctx.strokeStyle = 'rgba(139, 69, 19, 0.6)';
          ctx.lineWidth = 1;
          for (let i = 0; i < plat.width; i += 6) {
            ctx.beginPath();
            ctx.arc(x + i + 3, y + plat.height/2, 1.5, 0, Math.PI * 2);
            ctx.stroke();
          }
        }
        
        ctx.restore();
      });
      
      // Update and render players
      players[0].update(players[1]);
      players[1].update(players[0]);
      players.forEach(p => p.render(ctx));
      
      // Update projectiles
      projectiles = projectiles.filter(proj => {
        proj.x += proj.vx;
        proj.y += proj.vy;
        proj.life--;
        //ummm
        
        // Check hit
        players.forEach(player => {
          if (player.playerNum !== proj.owner && !player.invincible) {
            if (proj.x + proj.size > player.x && proj.x - proj.size < player.x + player.width && proj.y + proj.size > player.y && proj.y - proj.size < player.y + player.height){
              player.damage += proj.damage;
              const knockback = 1 + player.damage / 150;
              player.vx = Math.sign(proj.vx) * 5 * knockback / player.character.weight;
              player.vy = -3 * knockback / player.character.weight;
              createParticles(proj.x, proj.y, proj.color, 5);
              proj.life = 0;
            }
          }
        });
        
        return proj.life > 0 && proj.x > -50 && proj.x < 850 && proj.y > -50 && proj.y < 550;
      });
      
      // Render projectiles
      projectiles.forEach(proj => {
        ctx.fillStyle = proj.color;
        ctx.beginPath();
        ctx.arc(proj.x, proj.y, proj.size || 8, 0, Math.PI * 2);
        ctx.fill();
        
        // Trail
        ctx.fillStyle = proj.color + '40';
        ctx.beginPath();
        ctx.arc(proj.x - proj.vx, proj.y - proj.vy, (proj.size || 8) * 0.7, 0, Math.PI * 2);
        ctx.fill();
      });
      
      // Update particles
      particles = particles.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.95;
        p.vy *= 0.95;
        p.vy += 0.2;
        p.life--;
        p.size *= 0.95;
        return p.life > 0;
      });
      
      // Render particles
      particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life / 50;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      });
      
      // Update HUD
      document.getElementById('p1-damage').textContent = `${Math.floor(players[0].damage)}%`;
      document.getElementById('p2-damage').textContent = `${Math.floor(players[1].damage)}%`;
      
      for (let i = 0; i < 3; i++) {
        document.getElementById(`p1-life-${i}`).textContent = i < players[0].lives ? '❤️' : '🖤';
        document.getElementById(`p2-life-${i}`).textContent = i < players[1].lives ? '❤️' : '🖤';
      }
      
      // Timer
      gameTime--;
      const seconds = Math.max(0, Math.ceil(gameTime / 60));
      document.getElementById('game-timer').textContent = seconds;
      
      if (gameTime <= 0) {
        // Time up - player with more lives or less damage wins
        const p1Score = players[0].lives * 1000 - players[0].damage;
        const p2Score = players[1].lives * 1000 - players[1].damage;
        gameState = 'victory';
        renderVictory(p1Score >= p2Score ? 0 : 1);
        return;
      }
      
      gameLoop = requestAnimationFrame(gameUpdate);
    }
